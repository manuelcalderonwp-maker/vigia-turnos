# Guardar como:  .github/workflows/vigia.yml
name: Vigia de turnos Rosario

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Revisar turnos
        env:
          RUN_ONCE: "1"
          MR_CUIT: ${{ secrets.MR_CUIT }}
          MR_PASS: ${{ secrets.MR_PASS }}
          MR_MAIL_PASS: ${{ secrets.MR_MAIL_PASS }}
        run: python vigia_turnos_rosario.py

      - name: Subir diagnóstico (si falló)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico
          path: |
            debug.png
            debug.html
          if-no-files-found: ignore
