# Guardar este archivo en el repo como:  .github/workflows/vigia.yml
name: Vigia de turnos Rosario

on:
  schedule:
    - cron: "*/5 * * * *"     # cada 5 minutos (GitHub puede demorarlo un poco)
  workflow_dispatch:          # permite ejecutarlo a mano desde la web

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Revisar turnos
        env:
          RUN_ONCE: "1"
          MR_CUIT: ${{ secrets.MR_CUIT }}
          MR_PASS: ${{ secrets.MR_PASS }}
          MR_MAIL_PASS: ${{ secrets.MR_MAIL_PASS }}
        run: python vigia_turnos_rosario.py
